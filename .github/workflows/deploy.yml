name: Deploy to Amazon EC2

on:
  push:
    branches:
      - main  # Otomatis jalan setiap push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Masuk ke folder project (sesuaikan dengan nama repo kamu)
            cd ~/NAMA_REPO_KAMU || git clone https://github.com/${{ github.repository }} ~/NAMA_REPO_KAMU
            cd ~/NAMA_REPO_KAMU
            
            # Tarik kode terbaru
            git pull origin main
            
            # Hentikan container lama jika ada
            docker stop running-uts || true
            docker rm running-uts || true
            
            # Build ulang image
            docker build -t aplikasi-uts-matilde .
            
            # Jalankan container baru dengan environment variables dari secrets
            docker run -d -p 5000:5000 \
              -e DB_HOST='${{ secrets.DB_HOST }}' \
              -e DB_USER='admin' \
              -e DB_PASS='${{ secrets.DB_PASS }}' \
              -e DB_NAME='db_uts_cloud' \
              -e S3_BUCKET='${{ secrets.S3_BUCKET }}' \
              -e AWS_ACCESS_KEY='${{ secrets.AWS_ACCESS_KEY }}' \
              -e AWS_SECRET_KEY='${{ secrets.AWS_SECRET_KEY }}' \
              --name running-uts aplikasi-uts-matilde